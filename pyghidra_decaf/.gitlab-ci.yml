# GitLab CI/CD pipeline for pyghidra_decaf
#
# Stages:
#   lint    - ruff linting and format check
#   test    - unit tests across Python 3.10-3.12 (no Ghidra required)
#   build   - produce wheel + sdist with hatch-vcs version
#   publish - upload to GitLab PyPI registry (v* tags + dev on main)
#
# GIT_DEPTH: 0 is required so that hatch-vcs can walk the full tag history.
# hatch-vcs root is set to ".." (parent of this pyproject.toml), so the git
# repo root is one level up from pyghidra_decaf/.
#
# This is a pure-Python framework package — no Ghidra installation needed for
# unit tests. Integration tests live in the MCPyGhidra pipeline instead.

variables:
  GIT_DEPTH: 0
  DOCKER_BUILDKIT: "1"
  BUILDKIT_PROGRESS: plain
  # Python version for lint, build, and publish jobs.
  PRIMARY_PYTHON: "3.10"

# ---------------------------------------------------------------------------
# Pipeline deduplication: avoid running both push AND MR pipelines
# for the same commit when a branch has an open MR.
# ---------------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

stages:
  - lint
  - test
  - build
  - publish

# ---------------------------------------------------------------------------
# Shared before_script for jobs that run directly on the runner (no Docker).
# Uses python:X.Y images via the image: key instead of dood.
# ---------------------------------------------------------------------------
.pip-install: &pip-install
  before_script:
    - pip install --upgrade pip
    - pip install build hatchling hatch-vcs ".[dev]" --no-build-isolation

# ---------------------------------------------------------------------------
# lint — ruff check + format check
# ---------------------------------------------------------------------------
lint:ruff:
  stage: lint
  tags:
    - dood
  image: "python:3.12-slim"
  interruptible: true
  timeout: 5 minutes
  before_script:
    - pip install --upgrade pip ruff
  script:
    - ruff check src/
    - ruff format --check src/

lint:typecheck:
  stage: lint
  tags:
    - dood
  image: "python:3.12-slim"
  interruptible: true
  timeout: 10 minutes
  before_script:
    - pip install --upgrade pip
    - pip install build hatchling hatch-vcs ".[dev]" --no-build-isolation
  script:
    - mypy src/pyghidra_decaf
  allow_failure: true

# ---------------------------------------------------------------------------
# test — unit tests across Python versions
# ---------------------------------------------------------------------------
# pyghidra_decaf is a framework package. Only unit tests are run here — no
# Ghidra installation is needed. Full integration coverage lives in MCPyGhidra.
.test-base:
  stage: test
  tags:
    - dood
  interruptible: true
  timeout: 15 minutes
  before_script:
    - pip install --upgrade pip
    - pip install build hatchling hatch-vcs ".[dev]" --no-build-isolation
  script:
    - pytest tests/ -v --tb=short

test:3.10:
  extends: .test-base
  image: "python:3.10-slim"

test:3.11:
  extends: .test-base
  image: "python:3.11-slim"

# Primary coverage job — extracts Cobertura report for GitLab MR coverage.
test:3.12:
  extends: .test-base
  image: "python:3.12-slim"
  script:
    - |
      pytest tests/ -v --tb=short \
        --cov=src/pyghidra_decaf \
        --cov-report=term-missing \
        --cov-report=html:coverage-html \
        --cov-report=xml:coverage-cobertura.xml
  artifacts:
    name: "coverage-py3.12-${CI_PIPELINE_ID}"
    paths:
      - coverage-html/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage-cobertura.xml
    expire_in: 30 days
    when: always
  coverage: '/^TOTAL\s+\d+\s+\d+\s+\d+\s+\d+\s+(\d+\.\d+)%/'

# ---------------------------------------------------------------------------
# build — produce wheel + sdist
# ---------------------------------------------------------------------------
build:
  stage: build
  tags:
    - dood
  image: "python:3.10-slim"
  interruptible: true
  timeout: 10 minutes
  retry:
    max: 1
    when: runner_system_failure
  needs:
    - job: test:3.10
    - job: test:3.11
    - job: test:3.12
  before_script:
    - pip install --upgrade pip build hatchling hatch-vcs
  script:
    - python -m build
  artifacts:
    name: "pyghidra-decaf-dist-${CI_PIPELINE_ID}"
    paths:
      - dist/
    expire_in: 90 days

# ---------------------------------------------------------------------------
# publish — upload versioned wheel to GitLab PyPI registry (v* tags)
# ---------------------------------------------------------------------------
publish:
  stage: publish
  tags:
    - dood
  image: "python:3.10-slim"
  timeout: 5 minutes
  retry:
    max: 1
    when: runner_system_failure
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+/'
  before_script:
    - pip install --upgrade pip twine
  script:
    - |
      twine upload \
        --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
        -u gitlab-ci-token \
        -p "${CI_JOB_TOKEN}" \
        dist/*

# ---------------------------------------------------------------------------
# publish:dev — dev wheel to GitLab PyPI registry (main branch only)
# ---------------------------------------------------------------------------
publish:dev:
  stage: publish
  tags:
    - dood
  image: "python:3.10-slim"
  timeout: 5 minutes
  retry:
    max: 1
    when: runner_system_failure
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG == null'
  before_script:
    - pip install --upgrade pip twine
  script:
    - |
      twine upload \
        --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
        -u gitlab-ci-token \
        -p "${CI_JOB_TOKEN}" \
        dist/*
